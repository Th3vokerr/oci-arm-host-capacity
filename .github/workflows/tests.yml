name: Tests

on:
  workflow_dispatch: # We get rid of the buggy 'schedule: cron' entirely!

jobs:
  tests:
    runs-on: ubuntu-latest
    strategy:
      matrix:
        php-versions: ['8.3']
    name: integration-tests (PHP ${{ matrix.php-versions }})
    steps:
      - uses: actions/checkout@v1
      - name: Install PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php-versions }}
      - name: Validate composer.json and composer.lock
        run: composer validate

      - name: Get Composer Cache Directory
        id: composer-cache
        run: |
          echo "::set-output name=dir::$(composer config cache-files-dir)"
      - uses: actions/cache@v4
        with:
          path: ${{ steps.composer-cache.outputs.dir }}
          key: ${{ runner.os }}-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-${{ hashFiles('**/composer.lock') }}
          restore-keys: |
            ${{ runner.os }}-${{ matrix.php-version }}-composer-${{ matrix.dependencies }}-

      - name: Install dependencies
        run: |
          composer update --prefer-dist --no-progress

      - name: Create Private Key File
        run: |
          echo "${{ secrets.OCI_PRIVATE_KEY }}" > oci_api_key.pem

      - name: Run Instance Provisioner
        id: provisioner
        run: |
          php index.php > output.txt
          cat output.txt
          
          if grep -q "publicIp" output.txt || grep -q "ipAddress" output.txt; then
            IP_ADDR=$(grep -oE '[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}\.[0-9]{1,3}' output.txt | head -n 1)
            echo "SERVER_IP=$IP_ADDR" >> $GITHUB_ENV
            echo "STATUS=CREATED" >> $GITHUB_ENV
          else
            echo "STATUS=OUT_OF_CAPACITY" >> $GITHUB_ENV
          fi
        env:
          OCI_REGION: ${{ secrets.OCI_REGION }}
          OCI_USER_ID: ${{ secrets.OCI_USER_ID }}
          OCI_TENANCY_ID: ${{ secrets.OCI_TENANCY_ID }}
          OCI_KEY_FINGERPRINT: ${{ secrets.OCI_KEY_FINGERPRINT }}
          OCI_PRIVATE_KEY_FILENAME: ${{ secrets.OCI_PRIVATE_KEY_FILENAME }}
          OCI_AVAILABILITY_DOMAIN: ${{ secrets.OCI_AVAILABILITY_DOMAIN }}
          OCI_SUBNET_ID: ${{ secrets.OCI_SUBNET_ID }}
          OCI_IMAGE_ID: ${{ secrets.OCI_IMAGE_ID }}
          OCI_OCPUS: ${{ secrets.OCI_OCPUS }}
          OCI_MEMORY_IN_GBS: ${{ secrets.OCI_MEMORY_IN_GBS }}
          OCI_SHAPE: ${{ secrets.OCI_SHAPE }}
          OCI_MAX_INSTANCES: ${{ secrets.OCI_MAX_INSTANCES }}
          OCI_SSH_PUBLIC_KEY: ${{ secrets.OCI_SSH_PUBLIC_KEY }}

      - name: Discord Notification on Success
        if: env.STATUS == 'CREATED'
        run: |
          curl -H "Content-Type: application/json" \
               -X POST \
               -d "{\"content\": \"🎉 **SERVER CREATED SUCCESSFULLY IN FRANKFURT!**\n\n🌐 **IP Address:** \`${{ env.SERVER_IP }}\`\n👤 **Username:** \`opc\` *(or \`ubuntu\` if using Ubuntu image)*\n\n🚀 **SSH Login Command:**\n\`ssh -i C:\\\\Users\\\\Victus\\\\.ssh\\\\oci_key opc@${{ env.SERVER_IP }}\`\"}" \
               ${{ secrets.DISCORD_WEBHOOK_URL }}

      # NEW STEP: IF OUT OF CAPACITY, WAIT 5 MINUTES, THEN TRIGGER THE NEXT RUN AUTOMATICALLY
      - name: Precision Delay and Self-Chain Trigger
        if: env.STATUS == 'OUT_OF_CAPACITY'
        run: |
          echo "⏳ Waiting exactly 5 minutes before queuing the next attempt..."
          sleep 300
          echo "🚀 Triggering the next execution run now..."
          curl -X POST \
               -H "Authorization: token ${{ secrets.GH_PAT }}" \
               -H "Accept: application/vnd.github.v3+json" \
               https://github.com \
               -d '{"ref":"main"}'
